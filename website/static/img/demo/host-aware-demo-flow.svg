<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">45-second host-aware toast demo flow</title>
  <desc id="desc">Visual flow showing root toast, modal toast, sheet toast, dedupe, promise lifecycle, and keyboard-aware bottom toast.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0B132B" />
      <stop offset="100%" stop-color="#1C2541" />
    </linearGradient>
    <linearGradient id="card" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#3A506B" />
      <stop offset="100%" stop-color="#2B3A55" />
    </linearGradient>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#5BC0BE" />
    </marker>
    <style>
      .title { font: 700 42px "Segoe UI", Arial, sans-serif; fill: #FFFFFF; }
      .subtitle { font: 400 22px "Segoe UI", Arial, sans-serif; fill: #BFD8E6; }
      .nodeTitle { font: 700 20px "Segoe UI", Arial, sans-serif; fill: #FFFFFF; }
      .nodeBody { font: 400 16px "Segoe UI", Arial, sans-serif; fill: #DCEAF1; }
      .tag { font: 700 14px "Segoe UI", Arial, sans-serif; fill: #0B132B; }
    </style>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)" rx="16" />

  <text x="64" y="78" class="title">Host-Aware Toast Demo (45 seconds)</text>
  <text x="64" y="112" class="subtitle">One flow across root, modal, and bottom sheet with dedupe, promise lifecycle, and keyboard safety.</text>

  <rect x="64" y="160" width="170" height="34" rx="17" fill="#5BC0BE" />
  <text x="92" y="182" class="tag">0:00-0:05</text>
  <rect x="64" y="206" width="300" height="110" rx="14" fill="url(#card)" />
  <text x="84" y="238" class="nodeTitle">Root Success Toast</text>
  <text x="84" y="265" class="nodeBody">Tap Save Profile.</text>
  <text x="84" y="288" class="nodeBody">Toast appears in root host.</text>

  <rect x="396" y="160" width="170" height="34" rx="17" fill="#5BC0BE" />
  <text x="424" y="182" class="tag">0:05-0:10</text>
  <rect x="396" y="206" width="300" height="110" rx="14" fill="url(#card)" />
  <text x="416" y="238" class="nodeTitle">Modal Error Toast</text>
  <text x="416" y="265" class="nodeBody">Open modal, submit card.</text>
  <text x="416" y="288" class="nodeBody">Toast stays inside modal layer.</text>

  <rect x="728" y="160" width="170" height="34" rx="17" fill="#5BC0BE" />
  <text x="756" y="182" class="tag">0:10-0:16</text>
  <rect x="728" y="206" width="300" height="110" rx="14" fill="url(#card)" />
  <text x="748" y="238" class="nodeTitle">Sheet Warning Toast</text>
  <text x="748" y="265" class="nodeBody">Open sheet, apply coupon.</text>
  <text x="748" y="288" class="nodeBody">Toast renders in sheet host.</text>

  <rect x="1060" y="160" width="156" height="34" rx="17" fill="#5BC0BE" />
  <text x="1083" y="182" class="tag">0:16-0:22</text>
  <rect x="1016" y="206" width="200" height="110" rx="14" fill="url(#card)" />
  <text x="1036" y="238" class="nodeTitle">Dedupe</text>
  <text x="1036" y="265" class="nodeBody">Double tap retry.</text>
  <text x="1036" y="288" class="nodeBody">One toast remains.</text>

  <rect x="220" y="380" width="170" height="34" rx="17" fill="#5BC0BE" />
  <text x="248" y="402" class="tag">0:22-0:31</text>
  <rect x="220" y="426" width="360" height="120" rx="14" fill="url(#card)" />
  <text x="240" y="460" class="nodeTitle">Promise Lifecycle</text>
  <text x="240" y="488" class="nodeBody">Tap Upload Receipt once.</text>
  <text x="240" y="511" class="nodeBody">Loading toast transitions to success/error.</text>

  <rect x="640" y="380" width="170" height="34" rx="17" fill="#5BC0BE" />
  <text x="668" y="402" class="tag">0:31-0:39</text>
  <rect x="640" y="426" width="360" height="120" rx="14" fill="url(#card)" />
  <text x="660" y="460" class="nodeTitle">Keyboard Interaction</text>
  <text x="660" y="488" class="nodeBody">Focus input in sheet, open keyboard.</text>
  <text x="660" y="511" class="nodeBody">Bottom toast lifts above keyboard.</text>

  <rect x="1060" y="380" width="156" height="34" rx="17" fill="#5BC0BE" />
  <text x="1083" y="402" class="tag">0:39-0:45</text>
  <rect x="1016" y="426" width="200" height="120" rx="14" fill="url(#card)" />
  <text x="1036" y="460" class="nodeTitle">Final Root Toast</text>
  <text x="1036" y="488" class="nodeBody">Close sheet + modal.</text>
  <text x="1036" y="511" class="nodeBody">Done toast on root host.</text>

  <path d="M364 261 L396 261" stroke="#5BC0BE" stroke-width="4" fill="none" marker-end="url(#arrow)" />
  <path d="M696 261 L728 261" stroke="#5BC0BE" stroke-width="4" fill="none" marker-end="url(#arrow)" />
  <path d="M1028 261 L1016 261" stroke="#5BC0BE" stroke-width="4" fill="none" marker-end="url(#arrow)" />
  <path d="M1120 316 C1120 352 390 352 390 426" stroke="#5BC0BE" stroke-width="4" fill="none" marker-end="url(#arrow)" />
  <path d="M580 486 L640 486" stroke="#5BC0BE" stroke-width="4" fill="none" marker-end="url(#arrow)" />
  <path d="M1000 486 L1016 486" stroke="#5BC0BE" stroke-width="4" fill="none" marker-end="url(#arrow)" />
</svg>
