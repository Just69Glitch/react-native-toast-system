name: Feature request
description: Suggest an improvement for react-native-toast-system
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What user problem are you trying to solve?
      placeholder: Describe the current limitation.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe your preferred API/behavior.
      placeholder: Explain the desired outcome and possible API shape.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What workarounds or alternatives did you try?
  - type: textarea
    id: impact
    attributes:
      label: Compatibility impact
      description: Could this be breaking for existing users?
      placeholder: Note possible compatibility considerations.
  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I searched existing requests before opening this.
          required: true
        - label: This request is about public package-root API usage.
          required: true
