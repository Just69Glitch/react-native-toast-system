name: Release Preparation

on:
  workflow_dispatch:
    inputs:
      release_version:
        description: SemVer version to prepare (for example 0.2.0)
        required: true

permissions:
  contents: write
  pull-requests: write

jobs:
  prepare-release-pr:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10.30.2

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Validate version input
        shell: bash
        run: |
          if ! [[ "${{ github.event.inputs.release_version }}" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "release_version must be a valid SemVer string"
            exit 1
          fi

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run quality gates
        run: pnpm run validate:release

      - name: Update package version
        env:
          RELEASE_VERSION: ${{ github.event.inputs.release_version }}
        run: |
          node -e "const fs=require('fs');const pkg=JSON.parse(fs.readFileSync('package.json','utf8'));pkg.version=process.env.RELEASE_VERSION;fs.writeFileSync('package.json',JSON.stringify(pkg,null,2)+'\n');"

      - name: Ensure changelog reminder entry exists
        env:
          RELEASE_VERSION: ${{ github.event.inputs.release_version }}
        run: |
          node -e "const fs=require('fs');const file='CHANGELOG.md';const marker='## [Unreleased]';const heading='## ['+process.env.RELEASE_VERSION+'] - YYYY-MM-DD';let text=fs.readFileSync(file,'utf8');if(!text.includes(marker)){throw new Error('CHANGELOG.md is missing Unreleased heading');}if(!text.includes(heading)){text=text.replace(marker,marker+'\n\n'+heading+'\n\n### Added\n\n- _Fill in release notes before merge._');fs.writeFileSync(file,text);}"

      - name: Create release prep PR
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore(release): prepare v${{ github.event.inputs.release_version }}"
          branch: "chore/release-v${{ github.event.inputs.release_version }}"
          title: "chore(release): prepare v${{ github.event.inputs.release_version }}"
          body: |
            ## Release Preparation

            Automated by `release-preparation.yml`.

            ### Included
            - version bump in `package.json`
            - changelog heading placeholder for `${{ github.event.inputs.release_version }}`

            ### Before merge
            - replace `YYYY-MM-DD` with release date
            - fill real release notes under the new heading
            - verify release notes align with `docs/maintainers/VERSIONING.md` and `docs/maintainers/RELEASING.md`
          labels: |
            release
            chore
