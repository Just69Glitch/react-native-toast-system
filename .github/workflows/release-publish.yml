name: Release Publish

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to publish from (branch, tag, or SHA)
        required: true
        default: main
      npm_dist_tag:
        description: npm dist-tag to publish under
        required: true
        type: choice
        options:
          - latest
          - next
          - canary
        default: latest

permissions:
  contents: read
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.inputs.ref }}
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: pnpm
          cache-dependency-path: |
            pnpm-lock.yaml
            example/pnpm-lock.yaml
            website/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run release validation gates
        run: pnpm run validate:release

      - name: Resolve package metadata
        id: pkg
        shell: bash
        run: |
          node -e "const fs=require('fs');const pkg=require('./package.json');fs.appendFileSync(process.env.GITHUB_OUTPUT,'name='+pkg.name+'\\nversion='+pkg.version+'\\n');"

      - name: Verify version is not already published
        shell: bash
        run: |
          PKG="${{ steps.pkg.outputs.name }}"
          VER="${{ steps.pkg.outputs.version }}"
          if npm view "${PKG}@${VER}" version >/dev/null 2>&1; then
            echo "::error::${PKG}@${VER} is already published on npm."
            exit 1
          fi

      - name: Publish package to npm
        run: |
          npm publish --access public --tag "${{ github.event.inputs.npm_dist_tag }}"
